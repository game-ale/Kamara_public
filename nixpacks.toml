[phases.build]
cmds = [
    "npm install",
    "npm run build",
    "php artisan config:cache",
    "php artisan view:cache",
    "php artisan route:clear",
    "php artisan octane:install --server=frankenphp --no-interaction"
]

[start]
cmd = "php artisan route:clear && php artisan migrate --force && php artisan storage:link && php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=${PORT:-8080}"
